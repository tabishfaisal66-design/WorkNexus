<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | PeerGrid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="pg-shared.css">
 <style>
    body { background-color: #020617; color: #f1f5f9; font-family: sans-serif; margin: 0; }
  
    .chat-user-item:hover { background-color: #0c4a6e15; }
    .chat-user-item.active { background-color: #0c4a6e25; border-left: 3px solid #38bdf8; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }

    @media (max-width: 767px) {
      .mobile-view-chats #chat-window-viewport { display: none !important; }
      .mobile-view-active-chat #sidebar-chats-panel { display: none !important; }
      .mobile-view-active-chat #chat-window-viewport { display: flex !important; }
    }

    .pg-hamburger-nav, 
    header .fa-bars,
    [id*="hamburger"] {
      display: none !important;
    }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden mobile-view-chats" id="messages-body-wrapper">

<header class="page-header flex-shrink-0" id="pg-nav"></header>

  <div class="flex flex-1 max-w-[1400px] w-full mx-auto border-x border-slate-900 bg-[#020617] overflow-hidden" style="height: calc(100vh - 65px);">
    
    <div id="sidebar-chats-panel" class="w-full md:w-[360px] flex flex-col border-r border-slate-900 bg-[#030712] flex-shrink-0 h-full">
      <div class="p-4 border-b border-slate-900">
        <div class="flex items-center justify-between mb-3">
          <h1 class="text-lg font-black tracking-wide text-slate-100 flex items-center gap-2">
            Chats <span class="text-xs bg-sky-500/10 text-sky-400 px-2 py-0.5 rounded-full" id="total-chats-count">4</span>
          </h1>
          <button class="p-1.5 text-slate-400 hover:text-sky-400 rounded-lg hover:bg-slate-950 transition-colors">
            <i class="fas fa-edit text-sm"></i>
          </button>
        </div>
        <div class="flex items-center bg-slate-950 border border-slate-900 rounded-xl px-3 py-2 gap-2">
          <i class="fas fa-search text-slate-600 text-xs"></i>
          <input type="text" id="chat-search-input" oninput="filterPeerChatsSystem()" placeholder="Search or start new chat..." class="bg-transparent border-none outline-none text-xs text-slate-300 w-full placeholder-slate-600"/>
        </div>
      </div>

      <div id="peer-chats-list" class="flex-1 overflow-y-auto no-scrollbar divide-y divide-slate-950"></div>
    </div>

    <div class="hidden md:flex flex-1 flex-col h-full bg-[#020617] min-w-0" id="chat-window-viewport">
      
      <div id="empty-state-view" class="flex-1 flex flex-col items-center justify-center text-center p-6">
        <div class="w-16 h-16 rounded-full bg-slate-950 border border-slate-900 flex items-center justify-center text-slate-700 shadow-xl mb-4 animate-pulse">
          <i class="fas fa-comments text-2xl"></i>
        </div>
        <h3 class="text-sm font-bold text-slate-300 mb-1">PeerGrid Messenger</h3>
        <p class="text-xs text-slate-600 max-w-xs">Select a peer from the left side connection matrix panel to start absolute instant secure web networking chat.</p>
      </div>

      <div id="active-chat-view" class="hidden flex-1 flex flex-col h-full min-h-0 overflow-hidden">
        
        <div class="p-4 border-b border-slate-900 bg-[#030712] flex items-center justify-between flex-shrink-0">
          <div class="flex items-center gap-3">
            <button onclick="backToChatsList()" class="block md:hidden mr-1 text-slate-400 hover:text-slate-200 text-base py-1 px-2">
              <i class="fas fa-arrow-left"></i>
            </button>
            <div id="active-user-avatar" class="w-9 h-9 rounded-full bg-sky-950 border border-sky-900/50 flex items-center justify-center text-xs font-black text-sky-400 overflow-hidden"></div>
            <div>
              <h4 id="active-user-name" class="text-xs font-bold text-slate-200"></h4>
              <p class="text-[10px] text-emerald-500 flex items-center gap-1 mt-0.5">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Active Now
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2 text-slate-500">
            <button class="p-2 hover:text-slate-300"><i class="fas fa-phone-alt text-xs"></i></button>
            <button class="p-2 hover:text-slate-300"><i class="fas fa-video text-xs"></i></button>
            <button class="p-2 hover:text-slate-300"><i class="fas fa-info-circle text-xs"></i></button>
          </div>
        </div>

        <div id="chat-messages-stream" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[#020617] no-scrollbar min-h-0 flex flex-col"></div>

        <div class="p-3 border-t border-slate-900 bg-[#030712] flex-shrink-0">
          <form id="chat-input-form" onsubmit="dispatchMessageSystem(event)" class="flex items-center bg-slate-950 border border-slate-900 rounded-xl px-3 py-1.5 gap-2">
            <button type="button" class="text-slate-600 hover:text-slate-400 p-1"><i class="fas fa-plus text-xs"></i></button>
            <input type="text" id="message-text-payload" placeholder="Write an instant encrypted message..." class="bg-transparent border-none outline-none text-xs text-slate-300 w-full placeholder-slate-600 py-1" autocomplete="off"/>
            <button type="submit" class="text-sky-500 hover:text-sky-400 p-1.5 bg-sky-500/10 rounded-lg transition-all"><i class="fas fa-paper-plane text-xs"></i></button>
          </form>
        </div>
      </div>

    </div>
  </div>
  
  <script src="pg-shared.js"></script>
  <script>
    let currentUser = null;
    let selectedPeerIndex = null;

    const dummyPeerChatMatrix = [
      {
        name: "Ahmad Ali",
        initial: "AA",
        lastMsg: "Are you working on the FYP documentation?",
        time: "Yesterday",
        role: "Full Stack Lab Partner",
        history: [
          { sender: 'them', text: "Hey! Did you complete the route controller optimization parameters?", time: "Yesterday" },
          { sender: 'me', text: "Yes, MongoDB schemas and Node endpoints are completely stable now.", time: "Yesterday" },
          { sender: 'them', text: "Perfect! Are you working on the FYP documentation layout right now?", time: "Yesterday" }
        ]
      },
      {
        name: "Zainab Malik",
        initial: "ZM",
        lastMsg: "Check the design layout code once.",
        time: "2 days ago",
        role: "HR Talent Executive @ TechMatrix",
        history: [
          { sender: 'them', text: "Hello! We reviewed your frontend application profile portfolio. It aligns perfectly with our active UI stack.", time: "2 days ago" },
          { sender: 'them', text: "Check the design layout code once and optimize the Tailwind config grid variables.", time: "2 days ago" }
        ]
      },
      {
        name: "Premium Fitness Hub",
        initial: "PF",
        lastMsg: "Trainer portfolio approved.",
        time: "Jun 18",
        role: "Automated Platform Service Hub",
        history: [
          { sender: 'them', text: "Welcome to Dash Fitness System Integration Dashboard notifications.", time: "Jun 18" },
          { sender: 'me', text: "I have updated the application model files.", time: "Jun 18" },
          { sender: 'them', text: "System confirmation complete: Trainer portfolio approved.", time: "Jun 18" }
        ]
      }
    ];

    document.addEventListener("DOMContentLoaded", () => {
      currentUser = pgGetUser();
      if (!currentUser) return;
      pgBuildNav('messages');
      checkAndInitializeUrlUser();
    });

    function checkAndInitializeUrlUser() {
      const urlParams = new URLSearchParams(window.location.search);
      const targetUser = urlParams.get('user');
      
      if (targetUser) {
        const userNameDecoded = decodeURIComponent(targetUser);
        let existingIndex = dummyPeerChatMatrix.findIndex(
          chat => chat.name.toLowerCase() === userNameDecoded.toLowerCase()
        );
        
        if (existingIndex === -1) {
          const initials = userNameDecoded.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() || 'U';
          const newChatObject = {
            name: userNameDecoded,
            initial: initials,
            lastMsg: "Say hello to your new peer connection!",
            time: "Just Now",
            role: "Peer Connection",
            history: []
          };
          dummyPeerChatMatrix.unshift(newChatObject);
          existingIndex = 0;
        } else {
          const foundChat = dummyPeerChatMatrix.splice(existingIndex, 1)[0];
          dummyPeerChatMatrix.unshift(foundChat);
          existingIndex = 0;
        }
        
        selectedPeerIndex = existingIndex;
        renderChatsSidebarList(dummyPeerChatMatrix);
        initializeChatConsoleChannel(selectedPeerIndex);
      } else {
        renderChatsSidebarList(dummyPeerChatMatrix);
      }
    }

    function renderChatsSidebarList(datasource) {
      const targetListEl = document.getElementById("peer-chats-list");
      if (!targetListEl) return;

      if(datasource.length === 0) {
        targetListEl.innerHTML = `<div class="p-6 text-center text-xs text-slate-600">No active chats found</div>`;
        return;
      }

      targetListEl.innerHTML = datasource.map((chat) => {
        const isCurrentActive = selectedPeerIndex !== null && 
                                dummyPeerChatMatrix[selectedPeerIndex] && 
                                dummyPeerChatMatrix[selectedPeerIndex].name === chat.name;
        
        const realIndex = dummyPeerChatMatrix.indexOf(chat);
        return `
          <div onclick="initializeChatConsoleChannel(${realIndex})" class="chat-user-item p-3.5 flex items-start gap-3 cursor-pointer transition-all ${isCurrentActive ? 'active' : ''}">
            <div class="w-10 h-10 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center text-xs font-black text-slate-400 flex-shrink-0">
              ${chat.initial}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between mb-0.5">
                <h3 class="text-xs font-bold text-slate-200 truncate pr-2">${chat.name}</h3>
                <span class="text-[9px] text-slate-600 flex-shrink-0 font-medium">${chat.time}</span>
              </div>
              <p class="text-[11px] text-slate-500 truncate max-w-[220px]">${chat.lastMsg}</p>
            </div>
          </div>
        `;
      }).join('');
      
      document.getElementById("total-chats-count").innerText = datasource.length;
    }

    function initializeChatConsoleChannel(index) {
      selectedPeerIndex = index;
      const targetChatData = dummyPeerChatMatrix[index];
      if (!targetChatData) return;

      document.getElementById("empty-state-view").classList.add("hidden");
      document.getElementById("active-chat-view").classList.remove("hidden");

      document.getElementById("active-user-name").innerText = targetChatData.name;
      document.getElementById("active-user-avatar").innerText = targetChatData.initial;

      const wrapper = document.getElementById("messages-body-wrapper");
      wrapper.classList.remove("mobile-view-chats");
      wrapper.classList.add("mobile-view-active-chat");

      renderChatsSidebarList(dummyPeerChatMatrix);
      renderConversationThreadLog();
    }

    function backToChatsList() {
      const wrapper = document.getElementById("messages-body-wrapper");
      wrapper.classList.remove("mobile-view-active-chat");
      wrapper.classList.add("mobile-view-chats");
      selectedPeerIndex = null;
      renderChatsSidebarList(dummyPeerChatMatrix);
    }

    function renderConversationThreadLog() {
      const messageContainer = document.getElementById("chat-messages-stream");
      if (!messageContainer || selectedPeerIndex === null) return;

      const activeChat = dummyPeerChatMatrix[selectedPeerIndex];
      
      if (activeChat.history.length === 0) {
        messageContainer.innerHTML = `
          <div class="h-full flex items-center justify-center text-xs text-slate-600 tracking-wide m-auto">
            No messages yet. Send a message to start conversation!
          </div>`;
        return;
      }

      messageContainer.innerHTML = activeChat.history.map(msg => {
        const isMe = msg.sender === 'me';
        return `
          <div class="flex ${isMe ? 'justify-end' : 'justify-start'} w-full animate-fadeIn">
            <div class="max-w-[75%] md:max-w-[65%]">
              <div class="p-3 text-xs rounded-2xl ${isMe ? 'bg-sky-500 text-slate-950 font-medium rounded-tr-none' : 'bg-slate-900 text-slate-200 border border-slate-800/80 rounded-tl-none'} shadow-md break-words">
                ${msg.text}
              </div>
              <div class="text-[8px] text-slate-600 mt-1 ${isMe ? 'text-right' : 'text-left'} font-semibold tracking-wider">
                ${msg.time}
              </div>
            </div>
          </div>
        `;
      }).join('');

      setTimeout(() => { messageContainer.scrollTop = messageContainer.scrollHeight; }, 40);
    }

    function dispatchMessageSystem(event) {
      event.preventDefault();
      const textInput = document.getElementById("message-text-payload");
      if (!textInput || !textInput.value.trim() || selectedPeerIndex === null) return;

      const rightNow = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const currentPayloadText = textInput.value.trim();

      dummyPeerChatMatrix[selectedPeerIndex].history.push({
        sender: 'me',
        text: currentPayloadText,
        time: rightNow
      });

      dummyPeerChatMatrix[selectedPeerIndex].lastMsg = currentPayloadText;
      dummyPeerChatMatrix[selectedPeerIndex].time = rightNow;

      textInput.value = "";
      
      renderConversationThreadLog();
      renderChatsSidebarList(dummyPeerChatMatrix);
    }

    function filterPeerChatsSystem() {
      const currentQuery = document.getElementById("chat-search-input").value.toLowerCase().trim();
      const filteredResults = dummyPeerChatMatrix.filter(chat => 
        chat.name.toLowerCase().includes(currentQuery) || 
        chat.lastMsg.toLowerCase().includes(currentQuery)
      );
      renderChatsSidebarList(filteredResults);
    }
  </script>
</body>
</html>
